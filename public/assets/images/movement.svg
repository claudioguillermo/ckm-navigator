<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Responsive, AHA Themed Movement Guidelines -->
  <!-- Background -->
  <rect width="600" height="300" fill="#F9F9F9" rx="12" />

  <!-- Cardio Side -->
  <g transform="translate(150, 150)">
    <circle r="80" fill="#CF222B" />
    <!-- Walking/Running Icon -->
    <path d="M-10 -30 L10 -30 M0 -30 L0 -10 L15 10 M0 -10 L-10 20" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" />
    <text x="0" y="110" font-family="sans-serif" font-size="20" font-weight="800" fill="#000000" text-anchor="middle">CARDIO</text>
    <text x="0" y="130" font-family="sans-serif" font-size="14" fill="#636466" text-anchor="middle">150 min/week</text>
  </g>

  <!-- Plus Sign -->
  <g transform="translate(300, 150)">
    <path d="M-15 0 L15 0 M0 -15 L0 15" stroke="#636466" stroke-width="6" stroke-linecap="round" />
  </g>

  <!-- Strength Side -->
  <g transform="translate(450, 150)">
    <circle r="80" fill="#636466" />
    <!-- Dumbbell Icon -->
    <path d="M-30 -10 L-20 -10 L-20 10 L-30 10 Z M20 -10 L30 -10 L30 10 L20 10 Z M-20 0 L20 0" fill="white" stroke="white" stroke-width="2" />
    <text x="0" y="110" font-family="sans-serif" font-size="20" font-weight="800" fill="#000000" text-anchor="middle">STRENGTH</text>
    <text x="0" y="130" font-family="sans-serif" font-size="14" fill="#636466" text-anchor="middle">2 days/week</text>
  </g>

  <!-- Title -->
  <text x="300" y="40" font-family="sans-serif" font-size="22" font-weight="900" fill="#CF222B" text-anchor="middle">THE POWER DUO</text>
</svg>
