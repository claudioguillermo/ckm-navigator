<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" class="interactive-svg">
  <!-- Styles for interactivity -->
  <style>
    .interactive-zone {
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .interactive-zone:hover .zone-bg {
      fill: #CF222B;
      stroke-width: 4;
    }
    .interactive-zone:hover text {
      fill: white;
    }
    .interactive-zone:hover .icon {
      fill: white;
    }
    .zone-bg {
      fill: white;
      stroke: #636466;
      stroke-width: 2;
      transition: all 0.3s ease;
    }
    .icon {
      fill: #CF222B;
      transition: all 0.3s ease;
    }
    .house-outline {
      fill: none;
      stroke: #636466;
      stroke-width: 3;
    }
    .house-roof {
      fill: none;
      stroke: #636466;
      stroke-width: 3;
    }
  </style>

  <!-- House Analogy Diagram -->
  <!-- Base House Structure -->
  <path d="M100 350 L500 350 L500 150 L300 50 L100 150 Z" class="house-outline" />
  <path d="M80 160 L300 30 L520 160" class="house-roof" />

  <!-- Metabolism Section (Energy/Spark) - Solar Panel / Power Source -->
  <g class="interactive-zone" onclick="app.showOrganDetail('metabolism')">
    <rect x="350" y="70" width="100" height="60" rx="4" class="zone-bg" />
    <!-- Lightning Bolt / Spark Icon -->
    <path d="M390 80 L410 80 L400 100 L410 100 L390 125 L400 100 L390 100 Z" class="icon" />
    <text x="400" y="145" font-family="sans-serif" font-size="14" font-weight="bold" fill="#636466" text-anchor="middle">Metabolism (Energy)</text>
  </g>

  <!-- Heart Section (Electrical) - Fuse Box / Wiring -->
  <g class="interactive-zone" onclick="app.showOrganDetail('heart')">
    <rect x="150" y="180" width="120" height="80" rx="4" class="zone-bg" />
    <!-- Heart Icon -->
    <path d="M210 200 C200 185, 175 195, 210 230 C245 195, 220 185, 210 200" class="icon" />
    <!-- Electrical Lines -->
    <path d="M160 195 L180 195 M160 215 L180 215 M160 235 L180 235" stroke="#636466" stroke-width="2" />
    <text x="210" y="275" font-family="sans-serif" font-size="14" font-weight="bold" fill="#636466" text-anchor="middle">Heart (Electrical)</text>
  </g>

  <!-- Kidneys Section (Plumbing) - Pipes/Water -->
  <g class="interactive-zone" onclick="app.showOrganDetail('kidneys')">
    <rect x="330" y="240" width="120" height="80" rx="4" class="zone-bg" />
    <!-- Water Drop -->
    <path d="M390 255 Q405 275 405 290 A15 15 0 0 1 375 290 Q375 275 390 255 Z" class="icon" />
    <!-- Pipe Lines -->
    <path d="M420 250 L420 310 M340 310 L440 310" stroke="#636466" stroke-width="2" fill="none" />
    <text x="390" y="335" font-family="sans-serif" font-size="14" font-weight="bold" fill="#636466" text-anchor="middle">Kidneys (Plumbing)</text>
  </g>

  <!-- Connection Lines -->
  <path d="M400 130 L400 240" stroke="#CF222B" stroke-width="2" stroke-dasharray="5,5" fill="none" />
  <path d="M270 220 L330 280" stroke="#CF222B" stroke-width="2" stroke-dasharray="5,5" fill="none" />
</svg>
