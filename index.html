<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EMPOWER-CKM | Heart, Kidney & Metabolic Health</title>
    <meta name="description"
        content="A patient-centered guide to understanding the connection between heart, kidney, and metabolic health. Developed by physicians at MetroWest Medical Center.">

    <!-- Preload Critical Fonts (Phase 2 Performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        as="style">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap">

    <!-- PWA & Mobile -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CKM Navigator">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="assets/icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <!-- OpenGraph / Social -->
    <meta property="og:title" content="EMPOWER-CKM Navigator">
    <meta property="og:description" content="Personalized education for heart, kidney, and metabolic health.">
    <meta property="og:image" content="assets/images/og-preview.png">
    <meta property="og:type" content="website">

    <!-- Content Security Policy enforced server-side via Express middleware (server.js) -->

    <!-- DOMPurify for XSS Prevention -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"
        integrity="sha256-0kaYYq3qitkkVZpP/6uKTJwfTpqFNM6OHDbsaYzw9Uw=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"
        integrity="sha256-9ZhcQ7EeT5lwDgyXoNRKwSmCHyJ/F8YK/X3o1CHbWlg=" crossorigin="anonymous"></script>

    <link rel="preload" href="styles/main.css?v=13" as="style">
    <link rel="stylesheet" href="styles/main.css?v=13">
</head>

<body>
    <a href="#main-view" class="skip-link">Skip to main content</a>
    <div id="app-root">
        <!-- Horizontal Navigation -->
        <header class="top-bar" role="banner">


            <div class="nav-wrapper">
                <button type="button" class="hamburger-menu" aria-label="Toggle Navigation" aria-expanded="false">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <nav class="main-nav" role="navigation" aria-label="Main navigation">
                    <button type="button" class="nav-item active" data-action="navigateTo" data-args="'home'"
                        data-i18n="nav.home" aria-current="page">Dashboard</button>
                    <button type="button" class="nav-item" data-action="navigateTo" data-args="'education'"
                        data-i18n="nav.education">Curriculum</button>
                    <button type="button" class="nav-item" data-action="navigateTo" data-args="'clinic'"
                        data-i18n="nav.clinic">Clinic</button>
                </nav>
            </div>

            <div class="user-actions" role="toolbar" aria-label="User settings">
                <button type="button" class="chat-toggle-icon" data-action="toggleChat" data-args="true"
                    aria-label="Toggle AI Assistant"
                    style="width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border-soft); background: var(--bg-component); color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-right: 8px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </button>
                <button type="button" class="theme-toggle" data-action="toggleTheme" aria-label="Toggle Dark Mode"
                    style="width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border-soft); background: var(--bg-component); color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;">
                    <svg class="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="display: none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="display: block;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <!-- Language Slider -->
                <div class="lang-slider-container" role="group" aria-label="Language selector">
                    <div class="lang-slider-bg" aria-hidden="true"></div>
                    <button type="button" class="lang-option active" data-action="setLanguage" data-args="'en'"
                        data-lang="en" aria-pressed="true" aria-label="English">
                        <span class="flag" aria-hidden="true">🇺🇸</span> <span class="lang-code">EN</span>
                    </button>
                    <button type="button" class="lang-option" data-action="setLanguage" data-args="'pt'" data-lang="pt"
                        aria-pressed="false" aria-label="Português">
                        <span class="flag" aria-hidden="true">🇧🇷</span> <span class="lang-code">PT</span>
                    </button>
                    <button type="button" class="lang-option" data-action="setLanguage" data-args="'es'" data-lang="es"
                        aria-pressed="false" aria-label="Español">
                        <span class="flag" aria-hidden="true">🇪🇸</span> <span class="lang-code">ES</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="main-layout">

            <main class="content-area">
                <section id="main-view" class="view-container" aria-live="polite">
                    <!-- Dynamic Dashboard content injected by JS -->
                </section>
            </main>
        </div>

        <!-- Chat Sidebar -->
        <aside id="chat-sidebar" class="chat-sidebar" role="complementary" aria-label="AI Health Assistant Chat"
            aria-hidden="true">
            <div class="chat-resizer" role="separator" aria-orientation="vertical" tabindex="0"
                aria-label="Resize chat panel"></div>
            <div class="chat-sidebar-header">
                <h3 id="chat-title" data-i18n="chat.subtitle">AI Health Assistant</h3>
                <div class="chat-controls">
                    <button type="button" class="minimize-sidebar" data-action="minimizeChat" aria-label="Minimize chat"
                        style="background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin-right: 8px;">−</button>
                    <button type="button" class="close-sidebar" data-action="toggleChat" data-args="false"
                        aria-label="Close chat">×</button>
                </div>
            </div>

            <div class="sidebar-disclaimer" data-i18n="chat.disclaimer">
                For educational purposes only. Not medical advice. Not all features may be currently available.
            </div>

            <div id="chat-messages-sidebar" class="chat-messages-sidebar" role="log" aria-live="polite"
                aria-labelledby="chat-title">
                <!-- Messages will appear here -->
            </div>

            <div class="chat-sidebar-input" role="form" aria-label="Message input">
                <label for="chat-input-sidebar" class="sr-only">Type your health question</label>
                <input type="text" id="chat-input-sidebar" autocomplete="off" data-i18n-placeholder="chat.placeholder"
                    placeholder="Ask a health question...">
                <button type="button" class="btn btn-primary btn-send" data-i18n="chat.send"
                    data-action="sendSidebarChatMessage">Send</button>
            </div>
        </aside>
    </div>

    <!-- Organ Detail Modal -->
    <div id="modal-overlay" class="modal-overlay hidden" data-action="closeModal" role="dialog" aria-modal="true"
        aria-labelledby="modal-title">
        <div class="modal-content glass">
            <button type="button" class="close-btn" data-action="closeModal" aria-label="Close modal">×</button>
            <div id="modal-body">
                <!-- Dynamic Content -->
            </div>
        </div>
    </div>

    <!-- Security & Utilities -->
    <script src="js/config/inline-fallback-en.js?v=10" defer></script>
    <script src="js/dom-utils.js?v=10" defer></script>
    <script src="js/task-manager.js?v=10" defer></script>
    <script src="js/secure-storage.js?v=10" defer></script>
    <script src="js/core/i18n-service.js?v=10" defer></script>
    <script src="js/core/action-dispatcher.js?v=10" defer></script>
    <script src="js/features/curriculum-renderers.js?v=10" defer></script>
    <script src="js/features/curriculum-controller.js?v=10" defer></script>

    <!-- Application Scripts -->
    <script src="js/search-engine.js?v=10" defer></script>
    <script src="js/chatbot.js?v=10" defer></script>
    <script src="js/features/chat-controller.js?v=10" defer></script>
    <script src="js/features/quiz-controller.js?v=10" defer></script>
    <script src="js/features/medication-controller.js?v=10" defer></script>
    <script src="js/features/analogy-controller.js?v=10" defer></script>
    <script src="js/features/movement-controller.js?v=10" defer></script>
    <script src="js/features/food-controller.js?v=10" defer></script>
    <script src="main.js?v=10" defer></script>
</body>

</html>
